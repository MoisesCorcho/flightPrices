<!doctype html>

<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
            name="viewport"
        />
        <title>Flight Alerts - Search</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "on-primary": "#ffffff",
                            "primary-fixed": "#e2dfff",
                            "on-secondary-fixed": "#001e2f",
                            "on-tertiary": "#ffffff",
                            "tertiary-fixed-dim": "#4edea3",
                            "primary-fixed-dim": "#c3c0ff",
                            "on-secondary": "#ffffff",
                            "on-secondary-container": "#004666",
                            "surface-container-high": "#e7e8e9",
                            tertiary: "#005338",
                            "surface-container": "#edeeef",
                            "tertiary-container": "#006e4b",
                            "primary-container": "#4f46e5",
                            "surface-variant": "#e1e3e4",
                            "inverse-surface": "#2e3132",
                            "surface-tint": "#4d44e3",
                            "on-tertiary-fixed-variant": "#005236",
                            "secondary-fixed": "#c9e6ff",
                            "outline-variant": "#c7c4d8",
                            "on-primary-container": "#dad7ff",
                            "secondary-fixed-dim": "#89ceff",
                            error: "#ba1a1a",
                            "on-surface-variant": "#464555",
                            "surface-container-lowest": "#ffffff",
                            "surface-bright": "#f8f9fa",
                            "inverse-on-surface": "#f0f1f2",
                            "on-secondary-fixed-variant": "#004c6e",
                            primary: "#3525cd",
                            surface: "#f8f9fa",
                            "on-error": "#ffffff",
                            "on-primary-fixed-variant": "#3323cc",
                            "surface-dim": "#d9dadb",
                            "on-error-container": "#93000a",
                            "secondary-container": "#39b8fd",
                            "on-tertiary-container": "#67f4b7",
                            secondary: "#006591",
                            background: "#f8f9fa",
                            "surface-container-low": "#f3f4f5",
                            "on-background": "#191c1d",
                            "on-surface": "#191c1d",
                            "inverse-primary": "#c3c0ff",
                            "on-tertiary-fixed": "#002113",
                            "error-container": "#ffdad6",
                            "surface-container-highest": "#e1e3e4",
                            outline: "#777587",
                            "tertiary-fixed": "#6ffbbe",
                            "on-primary-fixed": "#002113",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        spacing: {
                            base: "8px",
                            "max-width": "1200px",
                            "container-padding-mobile": "16px",
                            "container-padding-desktop": "32px",
                            gutter: "16px",
                        },
                        fontFamily: {
                            "display-price": ["Inter"],
                            "body-md": ["Inter"],
                            "body-lg": ["Inter"],
                            "label-md": ["Inter"],
                            "headline-md": ["Inter"],
                            "headline-lg-mobile": ["Inter"],
                            "headline-lg": ["Inter"],
                            "label-sm": ["Inter"],
                        },
                        fontSize: {
                            "display-price": [
                                "40px",
                                {
                                    lineHeight: "48px",
                                    letterSpacing: "-0.02em",
                                    fontWeight: "700",
                                },
                            ],
                            "body-md": [
                                "16px",
                                { lineHeight: "24px", fontWeight: "400" },
                            ],
                            "body-lg": [
                                "18px",
                                { lineHeight: "28px", fontWeight: "400" },
                            ],
                            "label-md": [
                                "14px",
                                {
                                    lineHeight: "20px",
                                    letterSpacing: "0.01em",
                                    fontWeight: "500",
                                },
                            ],
                            "headline-md": [
                                "20px",
                                { lineHeight: "28px", fontWeight: "600" },
                            ],
                            "headline-lg-mobile": [
                                "24px",
                                { lineHeight: "32px", fontWeight: "600" },
                            ],
                            "headline-lg": [
                                "30px",
                                {
                                    lineHeight: "36px",
                                    letterSpacing: "-0.01em",
                                    fontWeight: "600",
                                },
                            ],
                            "label-sm": [
                                "12px",
                                { lineHeight: "16px", fontWeight: "600" },
                            ],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            body {
                font-family: "Inter", sans-serif;
                -webkit-tap-highlight-color: transparent;
            }
        </style>
        <style>
            body {
                min-height: max(884px, 100dvh);
            }
        </style>
    </head>
    <body class="bg-background text-on-background min-h-screen flex flex-col">
        <!-- TopAppBar -->
        <header
            class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl shadow-sm"
        >
            <div
                class="flex items-center justify-between px-container-padding-mobile h-16 w-full"
            >
                <div class="flex items-center gap-2">
                    <span
                        class="material-symbols-outlined text-primary dark:text-primary-fixed-dim"
                        data-icon="flight_takeoff"
                        >flight_takeoff</span
                    >
                    <h1
                        class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed-dim tracking-tight"
                    >
                        Flight Alerts
                    </h1>
                </div>
                <div
                    class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed"
                >
                    <img
                        alt="Profile"
                        class="w-full h-full object-cover"
                        data-alt="A professional headshot of a traveler in a modern airport setting. The person has a friendly expression and is dressed in minimalist, stylish corporate attire. The background is softly blurred, showing the clean, architectural lines of a high-end airport terminal with cool blue and white tones. The lighting is bright and natural, emphasizing a calm and reliable mood."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUOQmAmrUA1Y8Er69N6V_HkErODFFsQ_4JK6gdS1Wo0_8I8jPiBswdLtwKxNW4p2rdoU35hBUarCDQwWamJbVDzznMBFNnzzr6kke9LBOmEVs4V1pygKmtNiWcQ4hSlMIui85mr4YwFT0sD7ichLSOt0zyh5qZFguC-VZUTIKzOw_k9Anni6RTGYWxRoMUIdKsyashFPCz5doiHvO99-VN6dqNlYUa9Znk4dV8ro4w6kxyNJKa-K29lyELT7VBXV4dB0yy-dPviwcU"
                    />
                </div>
            </div>
        </header>
        <!-- Main Content Canvas -->
        <main
            class="flex-grow flex flex-col items-center justify-center px-container-padding-mobile pt-24 pb-32 max-w-max-width mx-auto w-full"
        >
            <!-- Hero Section -->
            <div class="w-full text-center mb-8">
                <h2
                    class="font-headline-lg text-headline-lg mb-2 text-on-surface"
                >
                    Find your next journey
                </h2>
                <p class="font-body-md text-body-md text-on-surface-variant">
                    Track prices and get instant notifications on price drops.
                </p>
            </div>
            <!-- Search Card -->
            <div
                class="w-full max-w-lg bg-surface-container-lowest rounded-[24px] p-6 shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30"
            >
                <div class="space-y-4">
                    <!-- Origin & Destination Inputs with Swap -->
                    <div class="relative flex flex-col gap-2">
                        <div class="flex flex-col gap-1">
                            <label
                                class="font-label-sm text-label-sm text-on-surface-variant px-1"
                                >From</label
                            >
                            <div
                                class="group flex items-center bg-surface-container-low rounded-xl px-4 h-14 border border-transparent focus-within:border-primary transition-all"
                            >
                                <span
                                    class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary mr-3"
                                    data-icon="flight_takeoff"
                                    >flight_takeoff</span
                                >
                                <input
                                    class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline"
                                    placeholder="Origin City or Airport"
                                    type="text"
                                />
                            </div>
                        </div>
                        <!-- Swap Button -->
                        <div
                            class="absolute right-6 top-1/2 -translate-y-1/2 z-10"
                        >
                            <button
                                class="bg-white shadow-md border border-outline-variant w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition-transform text-primary"
                            >
                                <span
                                    class="material-symbols-outlined"
                                    data-icon="swap_vert"
                                    >swap_vert</span
                                >
                            </button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label
                                class="font-label-sm text-label-sm text-on-surface-variant px-1"
                                >To</label
                            >
                            <div
                                class="group flex items-center bg-surface-container-low rounded-xl px-4 h-14 border border-transparent focus-within:border-primary transition-all"
                            >
                                <span
                                    class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary mr-3"
                                    data-icon="flight_land"
                                    >flight_land</span
                                >
                                <input
                                    class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline"
                                    placeholder="Destination City or Airport"
                                    type="text"
                                />
                            </div>
                        </div>
                    </div>
                    <!-- Date Picker -->
                    <div class="flex flex-col gap-1">
                        <label
                            class="font-label-sm text-label-sm text-on-surface-variant px-1"
                            >Travel Date</label
                        >
                        <div
                            class="group flex items-center bg-surface-container-low rounded-xl px-4 h-14 border border-transparent focus-within:border-primary transition-all"
                        >
                            <span
                                class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary mr-3"
                                data-icon="calendar_today"
                                >calendar_today</span
                            >
                            <input
                                class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-outline"
                                placeholder="Select date"
                                type="text"
                            />
                        </div>
                    </div>
                    <!-- Primary CTA -->
                    <button
                        class="w-full bg-primary-container text-on-primary font-headline-md text-headline-md h-[56px] rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4"
                    >
                        <span
                            class="material-symbols-outlined"
                            data-icon="search"
                            >search</span
                        >
                        Search Flights
                    </button>
                </div>
            </div>
        </main>
        <!-- BottomNavBar -->
        <nav
            class="fixed bottom-0 w-full z-50 pb-safe bg-surface/90 dark:bg-surface-dim/90 backdrop-blur-lg shadow-[0px_-4px_20px_rgba(0,0,0,0.05)]"
        >
            <div class="flex justify-around items-center h-16 w-full px-2">
                <a
                    class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold bg-primary-fixed dark:bg-primary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-200"
                    href="#"
                >
                    <span class="material-symbols-outlined" data-icon="search"
                        >search</span
                    >
                    <span class="font-label-sm text-label-sm">Search</span>
                </a>
                <a
                    class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high transition-colors active:scale-90 transition-all duration-200"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="notifications_active"
                        >notifications_active</span
                    >
                    <span class="font-label-sm text-label-sm">Alerts</span>
                </a>
                <a
                    class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high transition-colors active:scale-90 transition-all duration-200"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="notifications"
                        >notifications</span
                    >
                    <span class="font-label-sm text-label-sm">Updates</span>
                </a>
            </div>
        </nav>
    </body>
</html>
